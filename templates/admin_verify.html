<!DOCTYPE html>
<html>
<head>
    <title>Execution Trigger</title>
    <style>
        body { font-family: sans-serif; padding: 50px; text-align: center; }
        .box { border: 1px solid #ccc; padding: 30px; display: inline-block; border-radius: 10px; }
        input { margin: 10px; padding: 10px; width: 80%; }
        button { background: #dc3545; color: white; border: none; padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🏥 Death Verification System</h2>
        <form action="/verify-death" method="post">
            <input type="email" name="email" placeholder="Testator Email Address" required>
            <p>Upload Death Certificate (Authorized Admin Only):</p>
            <input type="file" required>
            <br>
            <button type="submit">Verify & Activate Will</button>
        </form>
    </div>
</body>
</html>
